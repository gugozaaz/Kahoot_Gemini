version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # Uncomment the below block to run Cloudflare Tunnel.
  # Replace <YOUR_TOKEN> with your actual Cloudflare Tunnel token.
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   command: tunnel --no-autoupdate run --token <YOUR_TOKEN>
  #   restart: unless-stopped
